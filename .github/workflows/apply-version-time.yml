name: Apply version and Riyadh time display

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch header version display
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('routes/web.php')
          s = p.read_text()

          if 'function app_release_version()' not in s:
              marker = "function app_layout(string $title, string $body, ?object $user = null): string\n{"
              helper = """function app_release_version(): string\n{\n    return env('APP_VERSION', '1.4.0');\n}\n\nfunction riyadh_now_label(): string\n{\n    return now('Asia/Riyadh')->format('Y-m-d H:i');\n}\n\n"""
              s = s.replace(marker, helper + marker)

          desktop_old = '<div class=\"text-slate-300 text-sm mt-1\">لوحة التحكم الداخلية</div>'
          desktop_new = '<div class=\"text-slate-300 text-sm mt-1\">لوحة التحكم الداخلية</div><div class=\"mt-3 text-xs text-slate-400 leading-6\">تحديث رقم: '.app_release_version().'<br>توقيت الرياض: '.riyadh_now_label().'</div>'
          s = s.replace(desktop_old, desktop_new)

          mobile_old = '<div class=\"text-slate-300 text-xs\">اضغط لاختيار القسم</div>'
          mobile_new = '<div class=\"text-slate-300 text-xs\">اضغط لاختيار القسم</div><div class=\"text-slate-400 text-[11px] mt-1\">تحديث '.app_release_version().' - '.riyadh_now_label().'</div>'
          s = s.replace(mobile_old, mobile_new)

          p.write_text(s)
          PY
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add routes/web.php
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "show app version and Riyadh time"
            git push
          fi
